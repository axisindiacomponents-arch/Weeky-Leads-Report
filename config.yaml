wordpress:
  base_url: https://axis-india.com/wp-json
  # Application Password username — password is read from WORDPRESS_APP_PASSWORD env var
  auth_username: Editor_account

  forms:
    catalogue_download:
      form_id: 57
      report_column: "Catalogue downloads"
    sales_inquiry:
      form_id: XX
      report_column: "Sales Inquiry"
    footer_form:
      form_id: XX
      report_column: "Footer form"
    get_prices:
      form_id: XX
      report_column: "Get Prices now"
    chatbot:
      form_id: XX
      report_column: "Chat Bot"
Uses [WordPress Application Passwords](https://make.wordpress.org/core/2020/11/05/application-passwords-integration-guide/).
  # Flamingo "channel" name → internal report key
  # These are the CF7 form titles as stored in Flamingo inbound messages.
  flamingo_channels:
    "PDF Download":           catalogue
    "sales enquiry 2":        sales
    "Footer Contact form":    footer
    "Get Prices":             prices
    "Popup Form":             popup
    "Ebook Archive Page":     ebooks
    "Substation Earthing":    ebooks   # merged into ebooks bucket

  ebook_keywords:
    "Ebook Arch":
      - "earthing"
      - "architecture"
      - "grounding"
    "HST":
      - "heat shrink"
      - "HST"
    "ESE":
      - "ESE"
      - "early streamer"
    "Substation":
      - "substation"
    "LP Stds":
      - "lightning protection standards"
      - "LP standards"

report:
  india_location_value: "India"
  timezone: "Asia/Kolkata"
  output_format: "Total(India)"  # e.g., "21(11)"
